# docker-compose.yml
# production — run with `docker compose up -d`
networks:
  lighthouse:

services:
  backend:
    build:
      context: ./backend/app
      dockerfile: Dockerfile
    container_name: lighthouse-backend
    ports:
      - "127.0.0.1:8000:8000" # localhost only — needed for file management page
    networks:
      - lighthouse
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lighthouse}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-lighthouse_secret}
    volumes:
      - tor_data:/var/lib/tor:ro
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    container_name: lighthouse-frontend
    networks:
      - lighthouse
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: lighthouse-caddy
    networks:
      - lighthouse
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:4405:4405" # files management, localhost only
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  tor:
    image: leplusorg/tor:latest
    container_name: lighthouse-tor
    user: root
    networks:
      - lighthouse
    environment:
      - SOCKS_HOSTNAME=0.0.0.0
      - |
        TORRC_APPEND=HiddenServiceDir /var/lib/tor/hidden_service/
        HiddenServicePort 80 caddy:80
    volumes:
      - tor_data:/var/lib/tor
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: lighthouse-minio
    command: server /data --console-address ":9001"
    networks:
      - lighthouse
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lighthouse}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-lighthouse_secret}
    ports:
      - "127.0.0.1:9000:9000" # localhost only — presigned URLs from host
      - "127.0.0.1:9001:9001" # localhost only — minio console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc
    container_name: lighthouse-minio-init
    networks:
      - lighthouse
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-lighthouse}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-lighthouse_secret}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/lighthouse &&
        echo 'Bucket lighthouse created.'
      "
    restart: on-failure

volumes:
  caddy_data:
  caddy_config:
  minio_data:
  tor_data:
