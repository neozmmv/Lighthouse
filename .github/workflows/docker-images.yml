name: Build & Push Docker Images

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Frontend - Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: ${{ matrix.platform }}
          tags: neozmmv/lighthouse-frontend:${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}

      - name: Backend - Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/app
          push: true
          platforms: ${{ matrix.platform }}
          tags: neozmmv/lighthouse-backend:${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Merge Frontend manifests
        run: |
          docker buildx imagetools create -t neozmmv/lighthouse-frontend:latest \
            neozmmv/lighthouse-frontend:amd64 \
            neozmmv/lighthouse-frontend:arm64

      - name: Merge Backend manifests
        run: |
          docker buildx imagetools create -t neozmmv/lighthouse-backend:latest \
            neozmmv/lighthouse-backend:amd64 \
            neozmmv/lighthouse-backend:arm64
