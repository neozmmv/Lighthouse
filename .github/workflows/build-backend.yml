name: Build Backend Binary

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: lighthouse-backend-linux-amd64

          - goos: linux
            goarch: arm64
            asset_name: lighthouse-backend-linux-arm64

          - goos: windows
            goarch: amd64
            asset_name: lighthouse-backend-windows-amd64.exe

          - goos: darwin
            goarch: amd64
            asset_name: lighthouse-backend-darwin-amd64

          - goos: darwin
            goarch: arm64
            asset_name: lighthouse-backend-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-X main.version=${{ github.ref_name }}" \
            -o ${{ matrix.asset_name }} .
        working-directory: backend-go

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: backend-go/${{ matrix.asset_name }}
